      <stop offset="0" stop-color="#0E0F14" />
      <stop offset="1" stop-color="#191B22" />
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B2A45" />
      <stop offset="1" stop-color="#5E3B52" />
