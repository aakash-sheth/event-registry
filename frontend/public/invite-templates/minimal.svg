  <rect x="210" y="760" width="300" height="64" rx="32" fill="#0D6EFD" />
  <text x="360" y="802" text-anchor="middle" font-family="Inter, system-ui" font-size="28" fill="#FFFFFF">RSVP</text>
  <rect x="210" y="850" width="300" height="64" rx="32" fill="#EEF2FF" stroke="#BFDBFE" />
  <text x="360" y="892" text-anchor="middle" font-family="Inter, system-ui" font-size="28" fill="#1D4ED8">View Registry</text>
