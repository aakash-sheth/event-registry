      <stop offset="0" stop-color="#F8F7F4" />
      <stop offset="1" stop-color="#EFEDE7" />
    </linearGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#minimalBg)" />
  <rect x="72" y="140" width="576" height="1000" rx="32" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" />
  <text x="360" y="300" text-anchor="middle" font-family="Inter, system-ui" font-size="28" fill="#6B7280">You're Invited</text>
